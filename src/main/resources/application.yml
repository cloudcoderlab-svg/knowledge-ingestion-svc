server:
  port: 8087

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha

spring:
  application:
    name: knowledge_engine_svc
  datasource:
    url: jdbc:postgresql://${KENGINE_DB_HOST:34.58.46.227}:5432/kengine-db
    username: ${KENGINE_DB_USER:*****}
    password: ${KENGINE_DB_PASSWORD:*****}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
          fetch_size: 50
        order_inserts: true
        order_updates: true
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.xml
    liquibase-schema: public
    default-schema: knowledge
    drop-first: false
    enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false

gcp:
  project-id: app-lab-001
  storage:
    bucket-name: knowledge-resources-storage

vertex:
  project-id: ai-lab-001-494218
  location: us-central1
  classification-model-name: gemini-2.5-flash
  embedding-model-name: text-embedding-005

knowledge-engine:
  chunk:
    max-chars: 3000
    overlap-chars: 300
  parser:
    multimodal-types: pdf,png,jpg,jpeg,gif,bmp,webp,doc,docx,ppt,pptx,xls,xlsx
    use-multimodal: true
    max-document-size-mb: 50
  extraction:
    enable-document-level-analysis: true
    enable-entity-embeddings: true
  knowledge-graph:
    enable-persistence: true
    batch-size: 100
  object-layout:
    project-prefix-template: "projects/{projectName}/"

resilience4j:
  circuitbreaker:
    instances:
      vertexai:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 60s
        record-exceptions:
          - java.lang.Exception
        ignore-exceptions:
          - java.lang.IllegalArgumentException
      vertexai-embedding:
        register-health-indicator: true
        sliding-window-size: 20
        minimum-number-of-calls: 10
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 60s
        failure-rate-threshold: 60
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 5s
  retry:
    instances:
      vertexai:
        max-attempts: 4
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
      vertexai-embedding:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
