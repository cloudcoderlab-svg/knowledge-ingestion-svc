server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${KENGINE_DB_HOST:localhost}:${KENGINE_DB_PORT:5432}/${KENGINE_DB_NAME:kengine-db}
    username: ${KENGINE_DB_USER:kengine-app}
    password: ${KENGINE_DB_PASSWORD:}
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml

cloudsql:
  instance-id: appdata-inst-001
  database: kengine-db
  schema: public
  user: kengine-app

gcp:
  project-id: app-lab-001
  pubsub:
    subscription-id: kengine-knowledge-topic-sub

vertex:
  project-id: ai-lab-001-494218
  location: us-central1
  classification-model-name: gemini-2.5-flash
  embedding-model-name: text-embedding-005

ingestion:
  chunk:
    max-chars: 3000
    overlap-chars: 300
