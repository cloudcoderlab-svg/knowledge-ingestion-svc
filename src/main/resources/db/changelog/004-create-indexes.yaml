databaseChangeLog:
  - changeSet:
      id: 004-create-unique-indexes
      author: system
      changes:
        - createIndex:
            indexName: ux_ingestion_documents_source_hash
            tableName: ingestion_documents
            unique: true
            columns:
              - column:
                  name: project_id
              - column:
                  name: source_bucket
              - column:
                  name: source_object
              - column:
                  name: content_hash
        - createIndex:
            indexName: ux_artifacts_source_hash
            tableName: artifacts
            unique: true
            columns:
              - column:
                  name: project_id
              - column:
                  name: source_bucket
              - column:
                  name: source_object
              - column:
                  name: content_hash
        - createIndex:
            indexName: ux_semantic_chunks_source_hash_index
            tableName: semantic_chunks
            unique: true
            columns:
              - column:
                  name: project_id
              - column:
                  name: source_bucket
              - column:
                  name: source_object
              - column:
                  name: document_content_hash
              - column:
                  name: chunk_index

  - changeSet:
      id: 004-create-performance-indexes
      author: system
      changes:
        - createIndex:
            indexName: ix_artifacts_project_source
            tableName: artifacts
            columns:
              - column:
                  name: project_id
              - column:
                  name: source_object
        - createIndex:
            indexName: ix_semantic_chunks_project_source
            tableName: semantic_chunks
            columns:
              - column:
                  name: project_id
              - column:
                  name: source_object
              - column:
                  name: chunk_index
        - createIndex:
            indexName: ix_solution_components_project_artifact
            tableName: solution_components
            columns:
              - column:
                  name: project_id
              - column:
                  name: source_artifact_id
        - createIndex:
            indexName: ix_business_rules_project_artifact
            tableName: business_rules
            columns:
              - column:
                  name: project_id
              - column:
                  name: source_artifact_id
        - createIndex:
            indexName: ix_business_flows_project_artifact
            tableName: business_flows
            columns:
              - column:
                  name: project_id
              - column:
                  name: source_artifact_id
        - createIndex:
            indexName: ix_deployment_resources_project_artifact
            tableName: deployment_resources
            columns:
              - column:
                  name: project_id
              - column:
                  name: source_artifact_id
        - createIndex:
            indexName: ix_knowledge_relationships_project_artifact
            tableName: knowledge_relationships
            columns:
              - column:
                  name: project_id
              - column:
                  name: source_artifact_id
