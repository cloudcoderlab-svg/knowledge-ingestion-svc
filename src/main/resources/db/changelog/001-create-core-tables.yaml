databaseChangeLog:
  - changeSet:
      id: 001-create-projects-table
      author: system
      changes:
        - createTable:
            tableName: projects
            columns:
              - column:
                  name: project_id
                  type: text
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: project_name
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: source_bucket
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: gcs_prefix
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
              - column:
                  name: updated_at
                  type: timestamptz

  - changeSet:
      id: 001-create-domains-table
      author: system
      changes:
        - createTable:
            tableName: domains
            columns:
              - column:
                  name: project_id
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: domain
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
              - column:
                  name: updated_at
                  type: timestamptz
        - addPrimaryKey:
            tableName: domains
            columnNames: project_id, domain
        - addForeignKeyConstraint:
            baseTableName: domains
            baseColumnNames: project_id
            constraintName: fk_domain_project
            referencedTableName: projects
            referencedColumnNames: project_id

  - changeSet:
      id: 001-create-subdomains-table
      author: system
      changes:
        - createTable:
            tableName: subdomains
            columns:
              - column:
                  name: project_id
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: domain
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: subdomain
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
              - column:
                  name: updated_at
                  type: timestamptz
        - addPrimaryKey:
            tableName: subdomains
            columnNames: project_id, domain, subdomain
        - addForeignKeyConstraint:
            baseTableName: subdomains
            baseColumnNames: project_id, domain
            constraintName: fk_subdomain_domain
            referencedTableName: domains
            referencedColumnNames: project_id, domain

  - changeSet:
      id: 001-create-artifacts-table
      author: system
      changes:
        - createTable:
            tableName: artifacts
            columns:
              - column:
                  name: artifact_id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: project_id
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: domain
                  type: text
              - column:
                  name: subdomain
                  type: text
              - column:
                  name: source_bucket
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: source_object
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: source_generation
                  type: bigint
              - column:
                  name: source_checksum
                  type: text
              - column:
                  name: content_hash
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: artifact_type
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: file_type
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: text
              - column:
                  name: is_current
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
              - column:
                  name: updated_at
                  type: timestamptz
        - addForeignKeyConstraint:
            baseTableName: artifacts
            baseColumnNames: project_id
            constraintName: fk_artifact_project
            referencedTableName: projects
            referencedColumnNames: project_id
        - addForeignKeyConstraint:
            baseTableName: artifacts
            baseColumnNames: project_id, domain, subdomain
            constraintName: fk_artifact_subdomain
            referencedTableName: subdomains
            referencedColumnNames: project_id, domain, subdomain

  - changeSet:
      id: 001-create-ingestion-documents-table
      author: system
      changes:
        - createTable:
            tableName: ingestion_documents
            columns:
              - column:
                  name: document_id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: artifact_id
                  type: varchar(36)
                  constraints:
                    nullable: false
              - column:
                  name: project_id
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: source_bucket
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: source_object
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: source_generation
                  type: bigint
              - column:
                  name: source_checksum
                  type: text
              - column:
                  name: content_hash
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: chunk_count
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
        - addForeignKeyConstraint:
            baseTableName: ingestion_documents
            baseColumnNames: artifact_id
            constraintName: fk_document_artifact
            referencedTableName: artifacts
            referencedColumnNames: artifact_id
        - addForeignKeyConstraint:
            baseTableName: ingestion_documents
            baseColumnNames: project_id
            constraintName: fk_document_project
            referencedTableName: projects
            referencedColumnNames: project_id

  - changeSet:
      id: 001-create-semantic-chunks-table
      author: system
      changes:
        - createTable:
            tableName: semantic_chunks
            columns:
              - column:
                  name: chunk_id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: document_id
                  type: varchar(36)
                  constraints:
                    nullable: false
              - column:
                  name: artifact_id
                  type: varchar(36)
                  constraints:
                    nullable: false
              - column:
                  name: project_id
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: source_bucket
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: source_object
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: source_generation
                  type: bigint
              - column:
                  name: source_checksum
                  type: text
              - column:
                  name: document_content_hash
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: chunk_index
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: total_chunks
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: char_start
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: char_end
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: chunk_content_hash
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: domain
                  type: text
              - column:
                  name: subdomain
                  type: text
              - column:
                  name: content
                  type: text
              - column:
                  name: embedding
                  type: double precision[]
              - column:
                  name: created_at
                  type: timestamptz
        - addForeignKeyConstraint:
            baseTableName: semantic_chunks
            baseColumnNames: artifact_id
            constraintName: fk_chunk_artifact
            referencedTableName: artifacts
            referencedColumnNames: artifact_id
        - addForeignKeyConstraint:
            baseTableName: semantic_chunks
            baseColumnNames: document_id
            constraintName: fk_chunk_document
            referencedTableName: ingestion_documents
            referencedColumnNames: document_id
        - addForeignKeyConstraint:
            baseTableName: semantic_chunks
            baseColumnNames: project_id, domain, subdomain
            constraintName: fk_chunk_subdomain
            referencedTableName: subdomains
            referencedColumnNames: project_id, domain, subdomain
