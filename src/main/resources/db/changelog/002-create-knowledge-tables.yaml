databaseChangeLog:
  - changeSet:
      id: 002-create-solution-components-table
      author: system
      changes:
        - createTable:
            tableName: solution_components
            columns:
              - column:
                  name: component_id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: project_id
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: domain
                  type: text
              - column:
                  name: subdomain
                  type: text
              - column:
                  name: component_layer
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: component_name
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: component_type
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: capability
                  type: text
              - column:
                  name: responsibility
                  type: text
              - column:
                  name: technology
                  type: text
              - column:
                  name: owner
                  type: text
              - column:
                  name: lifecycle
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: source_artifact_id
                  type: varchar(36)
              - column:
                  name: source_chunk_id
                  type: varchar(36)
              - column:
                  name: confidence
                  type: double precision
              - column:
                  name: created_at
                  type: timestamptz
              - column:
                  name: updated_at
                  type: timestamptz
        - addForeignKeyConstraint:
            baseTableName: solution_components
            baseColumnNames: project_id
            constraintName: fk_solution_component_project
            referencedTableName: projects
            referencedColumnNames: project_id
        - addForeignKeyConstraint:
            baseTableName: solution_components
            baseColumnNames: source_artifact_id
            constraintName: fk_solution_component_artifact
            referencedTableName: artifacts
            referencedColumnNames: artifact_id
        - addForeignKeyConstraint:
            baseTableName: solution_components
            baseColumnNames: source_chunk_id
            constraintName: fk_solution_component_chunk
            referencedTableName: semantic_chunks
            referencedColumnNames: chunk_id

