        - addForeignKeyConstraint:
            baseTableName: resource_cost_estimates
            baseColumnNames: project_id
            constraintName: fk_cost_estimate_project
            referencedTableName: projects
            referencedColumnNames: project_id
        - addForeignKeyConstraint:
            baseTableName: resource_cost_estimates
            baseColumnNames: resource_id
            constraintName: fk_cost_estimate_resource
            referencedTableName: deployment_resources
            referencedColumnNames: resource_id
        - addForeignKeyConstraint:
            baseTableName: resource_cost_estimates
            baseColumnNames: source_artifact_id
            constraintName: fk_cost_estimate_artifact
