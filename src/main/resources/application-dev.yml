server:
  port: 8087

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha

spring:
  application:
    name: knowledge_engine_svc
  datasource:
    url: jdbc:postgresql://10.196.140.215:5432/kengine-db
    username: ${KENGINE_DB_USER:*****}
    password: ${KENGINE_DB_PASSWORD:*****}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
          fetch_size: 50
        order_inserts: true
        order_updates: true
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.xml
    liquibase-schema: public
    default-schema: knowledge
    drop-first: false
    enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false

gcp:
  project-id: gpc-d-disc
  storage:
    bucket-name: kengine-knowledge-artifacts

vertex:
  project-id: gpc-d-disc
  location: us-central1
  classification-model-name: gemini-2.5-flash
  embedding-model-name: text-embedding-005

knowledge-engine:
  chunk:
    max-chars: 3000
    overlap-chars: 300
  parser:
    multimodal-types: pdf,png,jpg,jpeg,gif,bmp,webp,doc,docx,ppt,pptx,xls,xlsx
    use-multimodal: true
    max-document-size-mb: 50
  extraction:
    enable-document-level-analysis: true
    enable-entity-embeddings: true
  ingestion:
    project-parallelism: 5
    parallelism: 2
  project-pipeline:
    parallelism: 5
    poll-ms: 1000
  knowledge-graph:
    enable-persistence: true
    batch-size: 100
  object-layout:
    project-prefix-template: "projects/{projectName}/"
